version: "3.8"

services:
  # 1. PostgreSQL Database Container
  db:
    image: postgres:15-alpine
    container_name: storm_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_pwd_123}
      POSTGRES_DB: ${POSTGRES_DB:-storm_weather_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-storm_weather_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis Cache Container
  redis:
    image: redis:7-alpine
    container_name: storm_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. FastAPI Backend Container
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: storm_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_secure_pwd_123}@db:5432/${POSTGRES_DB:-storm_weather_db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super_secret_key_lirrak_project_hurricane_9b3e1a}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. Next.js Frontend Container
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: storm_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
